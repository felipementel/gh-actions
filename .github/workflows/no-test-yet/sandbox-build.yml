name: Sanbox Dispatch ⚡
run-name: "${{ github.actor }} - ${{ github.run_id }}"

#SECRETS LOCAL: GITLEAKS_LICENSE, SNYK_TOKEN
#VARS LOCAL: SONAR_ORGANIZATION

#SECRETS REMOTE: SONAR_TOKEN, SONAR_PROJECT_KEY

on:
  pull_request:
    branches:
      - main
    types:
      closed
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docker/**'
      - 'docs/**'
  workflow_call:
    inputs:
      build_mode:
        description: "Build mode: Build or Build + Tag Validation"
        required: true
        type: string
        default: Build
      environment:
        description: "Qual ambiente deseja fazer o deploy?"
        type: string
        default: DEV
      git_leaks:
        type: boolean
        description: 'Run GitLeaks'
        required: false
        default: true
      sonar_qube:
        type: boolean
        description: 'Run SonarQube'
        required: false
        default: true
      unit_tests:
        type: boolean
        description: 'Run Unit Tests'
        required: false
        default: true
      snyk:
        type: boolean
        description: 'Snyk.io'
        required: false
        default: true
      msg_canal_deploy:
        type: string
        description: 'Message to be displayed in the summary'
        required: false
        default: 'Canal DEPLOY - O melhor canal sobre .NET, Azure, DevOps e IA'
      #build config
      dotnet_version:
        type: string
        description: '.NET Version'
        required: true
        default: 9.x
      project_base_dir:
        type: string
        description: 'Path to SLNX file'
        required: true
        default: ./src
      sln:
        type: string
        description: 'The SLNX full name. eg: DEPLOY.PROJECT.API.slnx'
        required: true
        default: ""
      main_project:
        type: string
        description: 'The main project. eg: DEPLOY.PROJECT.API'
        required: true
        default: ""
      report_title:
        type: string
        description: 'Message to be displayed in the unit test report title'
        required: true
        default: 'Canal DEPLOY'
      #build use
      sonar_exclusions:
        type: string
        description: 'Path to exclusion from sonar, like migrations. Use comma separation'
        required: true
        default: ""
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_PROJECT_KEY:
        required: true

env:
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'

jobs:
  build:
    name: Build
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag_version: ${{ steps.get_version.outputs.TAG }}
      now: ${{ steps.get_env.outputs.NOW }}
      image_exists: ${{ steps.check_image_and_tag.outputs.IMAGE_EXISTS }}
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Get Environment
        id: get_env
        run: |
          echo -e "${GREEN} ::warning::Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Sys - Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          sparse_checkout: |
            src
            test
          sparse_checkout_cone_mode: false

      - name: Sys - Get-Version from csproj
        id: get_version
        shell: bash
        run: |
          version=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj)

          if [[ -z "$version" ]]; then
            echo -e "${RED} Erro: A versão não foi encontrada no arquivo .csproj"
            exit 1
          fi

          echo "TAG=$version" >> "$GITHUB_OUTPUT"

      - name: Sys - Setup .NET version ${{ inputs.dotnet_version }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/setup-dotnet@main
        with:
          dotnet_version: ${{ inputs.dotnet_version }}

      - name: 🎃 Install Coverage
        if: ${{ inputs.unit_tests }}
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: 🧱 Git Leaks
        uses: gitleaks/gitleaks-action@v2
        if: ${{ inputs.git_leaks }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_NOTIFY_USER_LIST: '@felipementel'

      - name: 🔐 Set up JDK 23 to use with SonarCloud
        if: ${{ inputs.sonar_qube }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/setup-java@main
        with:
          java_version: 23
          distribution: 'zulu'

      - name: 🔐 SonarCloud packages cache
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/cache@main
        if: ${{ inputs.sonar_qube }}
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore_keys: ${{ runner.os }}-sonar

      - name: 🔐 SonarCloud scanner cache
        id: cache_sonar_scanner
        if: ${{ inputs.sonar_qube }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/cache@main
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore_keys: ${{ runner.os }}-sonar-scanner

      - name: 🔐 SonarCloud scanner installer
        if: ${{ inputs.sonar_qube }} #&& (steps.cache_sonar_scanner.outputs.cache-hit != 'true')
        run: |
          mkdir -p .sonar/scanner
          dotnet tool install --global dotnet-sonarscanner
        # --tool-path .sonar/scanner

      - name: 🔐 Build and analyze (Test ✅, Sonar ✅)
        if: ${{ inputs.unit_tests && inputs.sonar_qube }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ vars.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
            /d:sonar.exclusions="${{ inputs.sonar_exclusions || ' '}}"
          dotnet restore ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj
          dotnet build ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj --no-incremental
          dotnet-coverage collect 'dotnet test ./src/' --output-format xml --output 'coverage.xml'
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: 🔐 Build and analyze (Test ⛔, Sonar ✅)
        if: ${{ !inputs.unit_tests && inputs.sonar_qube }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ vars.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.exclusions="${{ inputs.sonar_exclusions || ' '}}"
          dotnet restore ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj
          dotnet build ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj --no-incremental
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: 🔐 Build and analyze (Test ✅, Sonar ⛔)
        if: ${{ inputs.unit_tests && !inputs.sonar_qube }}
        run: |
          dotnet-coverage collect 'dotnet test ./src/' -f xml -o 'coverage.xml'

      - name: ReportGenerator
        if: ${{ inputs.unit_tests }}
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/*coverage.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;Cobertura'
          assemblyfilters: '+*'
          classfilters: '-*.Migrations.*'
          filefilters: '+*'
          verbosity: 'Verbose'
          title: ${{ inputs.report_title }}
          tag: '${{ github.run_number }}_${{ github.run_id }}'
          toolpath: 'reportgeneratortool'

      - name: Upload coverage report artifact
        if: ${{ inputs.unit_tests }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: CoverageReport
          path: coveragereport

      - name: 🍵 Restore dependencies
        run: dotnet restore ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj

      - name: 🍵 Snyk Setup
        uses: snyk/actions/setup@master

      - name: 🍵 Run Snyk to check for vulnerabilities
        uses: snyk/actions/dotnet@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --file=${{ inputs.project_base_dir }}/${{ inputs.sln }}

      - name: 🍵 Upload result to GitHub Code Scanning
        if: ${{ inputs.git_leaks }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Write to workflow job summary
        run: |
          SUMMARY=$GITHUB_STEP_SUMMARY$'
          # Versão gerada\n
          | versao | data | 
          |--|--|
          | ${{ steps.get_version.outputs.tag }} | ${{ steps.get_env.outputs.now }} | \n
          Mensagem: ${{ inputs.msg_canal_deploy }}\n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check_image:
    name: Check if image exists
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      image_exists: ${{ steps.check_image_and_tag.outputs.IMAGE_EXISTS }}
    needs: build
    steps:
      - name: Log in to the Container registry
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/login-action@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image with same tag exists
        id: check_image_and_tag
        run: |
          IMAGE_TAG="ghcr.io/${{ github.actor }}/deploy.${{ inputs.image_name }}:${{ needs.build.outputs.tag_version }}"
          echo "Checking existence of $IMAGE_TAG..."
          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo -e "✅ ${GREEN} Image exists in registry"
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo -e "🔍 ${RED} Image does not exist in registry"
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

  notify_image_exists:
    name: Notify when already image exists
    needs: [build, check_image]
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: ${{ needs.check_image.outputs.image_exists == 'true' }}
    steps:
      - name: Write to workflow job summary
        run: |
          echo "⛔ Image with tag ${{ needs.build.outputs.tag_version }} already exists. Skipping push image to registry and publish on Azure Cloud." >> $GITHUB_STEP_SUMMARY

  notify_not_image_exists:
    name: Notify when already image exists
    needs: [build, check_image]
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: ${{ needs.check_image.outputs.image_exists == 'false' }}
    steps:
      - name: Write to workflow job summary
        run: |
          echo "✅ Image with tag ${{ needs.build.outputs.tag_version }} can br published on Azure Cloud." >> $GITHUB_STEP_SUMMARY
