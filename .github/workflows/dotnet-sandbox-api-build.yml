name: DevSecOps Dispatch ⚡
run-name: "${{ github.actor }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      build_mode:
        description: "Qual ação deseja fazer?"
        required: true
        default: 'Build'
        type: string
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
        default: 'development'
      tests_folder:
        type: string
        description: 'The main test folder'
        required: false
        default: ''
      #build config
      dotnet_version:
        type: string
        description: '.NET Version'
        required: true
        default: 9.x
      project_base_dir:
        type: string
        description: 'Path to SLNX file'
        required: true
        default: ./src
      solution_file_name:
        type: string
        description: 'The SLNX or SLN full name. eg: DEPLOY.PROJECT.API.slnx'
        required: true
        default: ""
      main_project:
        type: string
        description: 'The main project. eg: DEPLOY.PROJECT.API'
        required: true
        default: ""
      report_title:
        type: string
        description: 'Message to be displayed in the unit test report title'
        required: true
        default: 'Sky Platform'
      #build use
      sonar_exclusions:
        type: string
        description: 'Path to exclusion from sonar, like migrations. Use comma separation'
        required: false
        default: ""
      #push-image
      image_name:
        type: string
        description: 'Image name to publish at github packages'
        required: true
        default: ""
      openapi_folder:
        type: string
        description: 'Path to the folder containing OpenAPI specification files.'
        required: false
        default: ""
      docker_file_full_path:
        type: string
        description: 'Full path to the Dockerfile to be used in the container scan (e.g. src/Project/Project/Dockerfile)'
        required: false
        default: ''
      dockerfile_folder:
        description: 'Folder containing the Dockerfile (relative to repo root)'
        required: false
        type: string
        default: 'docker'
      docker_build_context:
        type: string
        description: 'Docker build context (e.g. src/Project/Project or .)'
        required: false
        default: ''
      docker_setup:
        type: boolean
        description: 'Whether to set up Docker for the Snyk container scan'
        required: false
        default: false
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 0
      #registry
      registry:
        type: string
        description: 'Container registry URL (e.g. ghcr.io, docker.io, myacr.azurecr.io)'
        required: false
        default: 'ghcr.io'
      registry_username:
        type: string
        description: 'Registry username. Defaults to github.actor when empty (suitable for ghcr.io)'
        required: false
        default: ''
    secrets:
      SONAR_PROJECT_KEY:
        required: true
        description: 'Sonar Project Key'
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      SONAR_TOKEN:
        required: true
        description: 'Sonar Token'
      SAFETY_API_KEY:
        required: true
        description: 'Safety API Key'
      REGISTRY_PAT:
        required: false
        description: 'Registry PAT'
      # SNYK_TOKEN:
      #   required: true
      #   description: 'Snyk Token'
    outputs:
      tag_version:
        description: 'Versão da tag gerada'
        value: ${{ jobs.build.outputs.tag_version }}
      image_exists:
        description: 'Se a imagem já existe no registry'
        value: ${{ jobs.check_image.outputs.image_exists }}

env:
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  UNDERLINE: '\033[4m'
  BOLD_UNDERLINE: '\033[1;4m'
  BOLD_RED: '\033[1;31m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'
  BOLD_BLUE: '\033[1;34m'

jobs:
  build:
    name: Build
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag_version: ${{ steps.get_version.outputs.TAG }}
      now: ${{ steps.get_env.outputs.NOW }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      security-events: write
      packages: write
      id-token: write

    steps:
      - name: 🧭 Get Environment
        id: get_env
        run: |
          echo -e "${GREEN} ⚠️ Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          ref: ${{ github.ref }}
          fetch_depth: 0
          sparse_checkout: |
            source/
            tests/
            docker/
          sparse_checkout_cone_mode: false

      - name: 🔍 Get-Version from csproj
        id: get_version
        uses: felipementel/gh-actions/.github/actions/dotnet/get-version@main
        with:
          project_base_dir: ${{ inputs.project_base_dir }}
          main_project: ${{ inputs.main_project }}
          environment: ${{ inputs.environment }}

      - name: 🔍 Check Tag
        id: tag_check
        uses: felipementel/gh-actions/.github/actions/git/tag-check@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}
          version_file: ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj
          fail_on_exists: true

      - name: 🛠️ Setup .NET version ${{ inputs.dotnet_version }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/setup-dotnet@main
        with:
          dotnet_version: ${{ inputs.dotnet_version }}

      - name: ✅ Check .NET version in use
        run: |
          echo "DOTNET_ROOT: $DOTNET_ROOT"
          $DOTNET_ROOT/dotnet --info

      - name: 🧱📤 Git Leaks
        uses: felipementel/gh-actions/.github/actions/tools/security/giteaks@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks_license: ${{ secrets.GITLEAKS_LICENSE }}

      # - name: Owasp Dependency Check
      #   uses: felipementel/gh-actions/.github/actions/tools-owasp-zap@main
      #   with:
      #     projectBaseDir: ${{ inputs.project_base_dir }}
      #     mainProject: ${{ inputs.main_project }}
      #     solutionFileName: ${{ inputs.solution_file_name }}

      - name: 🐋 Docker setup
        uses: felipementel/gh-actions/.github/actions/tools/docker/setup@main

      - name: 🧪 Dotnet Test & Coverage
        id: dotnet_test
        uses: felipementel/gh-actions/.github/actions/dotnet/dotnet-test@main
        with:
          tests_folder: ${{ inputs.tests_folder }}
          report_title: ${{ inputs.report_title }}
          sonar_exclusions: ${{ inputs.sonar_exclusions }}
          run_number: ${{ github.run_number }}
          run_id: ${{ github.run_id }}

      - name: 📸 SonarCloud Analysis
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/sonar-cloud-dotnet@main
        with:
          has_tests: ${{ steps.dotnet_test.outputs.has_tests }}
          sonar_project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sonar_exclusions: ${{ inputs.sonar_exclusions }}
          project_base_dir: ${{ inputs.project_base_dir }}
          main_project: ${{ inputs.main_project }}
          solution_file_name: ${{ inputs.solution_file_name }}

      - name: 🎯 Generate coverage badge
        if: ${{ steps.dotnet_test.outputs.has_tests == 'true' }}
        uses: felipementel/gh-actions/.github/actions/tools/coverage-badge@main
        with:
          coverage_file: coveragereport/Cobertura.xml
          coverage_format: cobertura

      - name: 🐳 Docker Build (local, for Security scan)
        uses: felipementel/gh-actions/.github/actions/tools/docker/buildx@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          image_name: ${{ inputs.image_name }}
          tag_version: ${{ steps.get_version.outputs.TAG }}
          dockerfile: ${{ inputs.docker_file_full_path }}
          context: ${{ inputs.docker_build_context }}
          platforms: 'linux/amd64'
          push: 'false'
          load: 'true'

      # - name: 🍵 Snyk Security Scan
      #   uses: felipementel/gh-actions/.github/actions/tools/security/snyk-dotnet@main
      #   with:
      #     snyk-token: ${{ secrets.SNYK_API_KEY }}
      #     projectBaseDir: ${{ inputs.project_base_dir }}
      #     mainProject: ${{ inputs.main_project }}
      #     solutionFileName: ${{ inputs.solution_file_name }}
      #     imageName: ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/deploy.${{ inputs.image_name }}:${{ steps.get_version.outputs.TAG }}
      #     docker-file-full-path: ${{ inputs.docker_file_full_path }}
      #     docker-build-context: ${{ inputs.docker_build_context }}

      - name: 🍵 Safety Python Dependency Check
        uses: felipementel/gh-actions/.github/actions/tools/security/safety-python@main
        with:
          api_key: ${{ secrets.SAFETY_API_KEY }}

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '${{ env.working_directory }}'
          scanners: 'vuln,misconfig,secret'
          format: 'sarif'
          output_file: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ steps.check_trivyignore.outputs.path }}
          category: 'trivy-fs-vuln'

      - name: 🔎 Trivy - license scan
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'sarif'
          output_file: 'trivy-license-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ steps.check_trivyignore.outputs.path }}
          category: 'trivy-fs-license'

      - name: 🔎 Trivy - Image Scan (vuln, secret)fel
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          image_ref: ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }}:${{ steps.get_version.outputs.TAG }}
          scan_type: 'image'
          format: 'sarif'
          output_file: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ steps.check_trivyignore.outputs.path }}
          category: 'trivy-image'

      - name: 🏷️ Create Tag
        id: github_tag
        if: ${{ inputs.build_mode != 'Build' }}
        uses: felipementel/gh-actions/.github/actions/git/tag-create@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}

      - name: 🚀 Build to generate OpenAPI JSON
        if: ${{ inputs.openapi_folder != '' }}
        shell: bash
        run: |
          dotnet restore \
            ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj
          dotnet build \
            ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj \
            --no-restore \
            --output ./output_build

      - name: 🔍 Check OpenAPI files
        if: ${{ inputs.openapi_folder != '' }}
        shell: bash
        run: |
          openapi_path="./output_build/${{ inputs.openapi_folder }}"

          if find "$openapi_path" -maxdepth 1 -type f \( -name '*.json' -o -name '*.yaml' -o -name '*.yml' \) | grep -q .; then
            echo -e "${GREEN}✅ OpenAPI specification files found in ${openapi_path}."
          else
            echo -e "${YELLOW}⚠️ No OpenAPI specification files found in ${openapi_path}. Please ensure your build generates the expected OpenAPI JSON/YAML files."
            exit 1
          fi

      - name: Upload OpenAPI artifacts
        if: ${{ inputs.openapi_folder != '' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: OpenAPI-Specs
          path: |
            ./output_build/${{ inputs.openapi_folder }}/*.json
            ./output_build/${{ inputs.openapi_folder }}/*.yaml
            ./output_build/${{ inputs.openapi_folder }}/*.yml

      - name: 🚀 Spectral OpenAPI Lint
        if: ${{ inputs.openapi_folder != '' }}
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/spectral@main
        with:
          openapi_files_path: ./output_build/${{ inputs.openapi_folder }}
          node_version: ${{ env.nodeVersion }}

      - name: 🧾 Write to workflow job summary
        run: |
          SUMMARY=$GITHUB_STEP_SUMMARY$'
          # Versão gerada\n
          | versao | data | 
          |--|--|
          | ${{ steps.get_version.outputs.tag }} | ${{ steps.get_env.outputs.now }} | \n
          \n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check_image:
    name: Check if image exists
    if: ${{ inputs.build_mode == 'Build + Tag Validation' || inputs.build_mode == 'Build + Tag Validation + Deploy' }}
    # environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      image_exists: ${{ steps.check_image.outputs.IMAGE_EXISTS }}
    needs: build

    steps:
      - name: 🔍 Check if image exists in registry
        id: check_image
        uses: felipementel/gh-actions/.github/actions/tools/docker/check-image@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          registry_password: ${{ secrets.REGISTRY_PAT }}
          image_name: ${{ inputs.image_name }}
          tag_version: ${{ needs.build.outputs.tag_version }}

  push_image:
    name: Push image to Registry
    if: ${{ inputs.build_mode == 'Build + Tag Validation + Deploy' && needs.check_image.outputs.image_exists == 'false' }}
    # environment: ${{ inputs.environment }}
    # if: ${{ github.event.pull_request.merged && github.event.pull_request.state == 'closed' }}
    needs: [build, check_image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          fetch_depth: 0
          sparse_checkout: |
            src/
            docker/
          sparse_checkout_cone_mode: false

      - name: 🐳 Docker login
        uses: felipementel/gh-actions/.github/actions/tools/docker/login@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          registry_password: ${{ secrets.REGISTRY_PAT }}

      - name: 🐳 Push Docker image
        uses: felipementel/gh-actions/.github/actions/tools/docker/buildx@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          image_name: ${{ inputs.image_name }}
          tag_version: ${{ needs.build.outputs.tag_version }}
          dockerfile: ${{ inputs.docker_file_full_path }}
          context: ${{ inputs.docker_build_context }}
          platforms: 'linux/amd64'
          push: 'true'
          load: 'false'

      - name: 📝 Write to workflow job summary DEPLOY
        run: |
          SUMMARY=$'
          # Image publicada\n
          | versao | data | 
          |--|--|
          | ${{ needs.build.outputs.tag_version }} | ${{ needs.build.outputs.now }} | \n
          \n'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  notify_image_exists:
    name: Notify when already image exists
    if: ${{ inputs.build_mode == 'Build + Tag Validation + Deploy' && needs.check_image.outputs.image_exists == 'true'}}
    needs: [build, check_image]
    # environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Write to workflow job summary
        run: |
          echo "Image with tag ${{ needs.build.outputs.tag_version }} already exists. Skipping push image to registry and publish on Azure Cloud." >> $GITHUB_STEP_SUMMARY
