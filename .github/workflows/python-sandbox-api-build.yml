name: Python API Build 🐍
run-name: "${{ github.actor }} - ${{ inputs.build_mode }} - ${{ inputs.environment }} - ${{ github.run_id }}"

on:
  workflow_call:
    inputs:
      build_mode:
        description: "Qual ação deseja fazer?"
        required: true
        default: 'Build'
        type: string
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
        default: 'development'
      python_version:
        type: string
        description: 'Python version to use in the workflow'
        required: false
        default: '3.14'
      project_base_dir:
        type: string
        description: 'Path to project root (containing pyproject.toml)'
        required: false
        default: 'source'
      main_project:
        type: string
        description: 'Project name used in SonarCloud and reporting'
        required: false
        default: ''
      main_file:
        type: string
        description: 'Main Python file'
        required: false
        default: 'main.py'
      sparse_checkout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'source/'
      env_map_file:
        description: 'Env/Secret mapping file'
        required: false
        type: string
        default: ''
      tests_folder:
        type: string
        description: 'The main test folder'
        required: false
        default: 'tests'
      report_title:
        type: string
        description: 'Message to be displayed in the unit test report title'
        required: false
        default: 'Sky Platform'
      sonar_exclusions:
        type: string
        description: 'Paths to exclude from SonarCloud analysis (comma separated)'
        required: false
        default: ''
      image_name:
        type: string
        description: 'Docker image name'
        required: true
      openapi_folder:
        description: 'Path to folder that will receive the exported OpenAPI JSON. Leave empty to skip Spectral linting.'
        required: false
        type: string
        default: ''
      dockerfile_folder:
        description: 'Folder containing the Dockerfile (relative to repo root)'
        required: false
        type: string
        default: 'docker'
      docker_build_context:
        description: 'Docker build context (relative to repo root)'
        required: false
        type: string
        default: '.'
      docker_setup:
        description: 'Whether to set up Docker (QEMU + Buildx) for multi-platform builds'
        required: false
        type: boolean
        default: false
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 0
      #registry
      registry:
        type: string
        description: 'Container registry URL (e.g. ghcr.io, docker.io, myacr.azurecr.io)'
        required: false
        default: 'ghcr.io'
      registry_username:
        type: string
        description: 'Registry username / org. Defaults to github.actor when empty (suitable for ghcr.io)'
        required: false
        default: ''
      docker_build_context:
        description: 'Docker build context (relative to repo root)'
        required: false
        type: string
        default: '.'
      openapi_folder:
        description: 'Path to folder that will receive the exported OpenAPI JSON (e.g. output_openapi). Leave empty to skip Spectral linting.'
        required: false
        type: string
        default: ''
      sonar_exclusions:
        description: 'Paths to exclude from SonarCloud analysis (comma separated)'
        required: false
        type: string
        default: ''
      #registry
      registry:
        type: string
        description: 'Container registry URL (e.g. ghcr.io, docker.io, myacr.azurecr.io)'
        required: false
        default: 'ghcr.io'
      registry_username:
        type: string
        description: 'Registry username / org. Defaults to github.actor when empty (suitable for ghcr.io)'
        required: false
        default: ''
    secrets:
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      CODECOV_TOKEN:
        required: false
        description: 'Codecov token for coverage upload'
      REGISTRY_PAT:
        required: false
        description: 'Registry password/token.'
      SONAR_TOKEN:
        required: false
        description: 'SonarCloud token'
      SONAR_PROJECT_KEY:
        required: false
        description: 'SonarCloud project key'
      SAFETY_API_KEY:
        required: false
        description: 'Safety API Key'
    outputs:
      tag_version:
        description: 'The version tag built and published'
        value: ${{ jobs.build.outputs.tag_version }}
      image_exists:
        description: 'Whether the image already existed in the registry (true/false)'
        value: ${{ jobs.check_image.outputs.image_exists }}

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  javaVersion: 23
  javaDistro: zulu
  nodeVersion: 24

jobs:
  build:
    name: Build Python FastAPI
    environment: ${{ inputs.environment }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tag_version: ${{ steps.get_version.outputs.TAG }}
      now: ${{ steps.get_env.outputs.NOW }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      security-events: write
      packages: write
      id-token: write

    steps:

      - name: 🧭 Get Environment
        id: get_env
        run: |
          echo -e "${GREEN} ⚠️ Environment ${{ inputs.environment }}"
          echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          ref: ${{ github.ref }}
          fetch_depth: 0
          sparse_checkout: |
            source/
            docker/
            tests/      
          sparse_checkout_cone_mode: false

      - name: 🏷️ Extract Application Version
        uses: felipementel/gh-actions/.github/actions/python/get-version@main
        id: get_version
        with:
          project_base_dir: ${{ inputs.project_base_dir }}
          environment: ${{ inputs.environment }}

      - name: 🏷️ Check Tag
        id: tag_check
        uses: felipementel/gh-actions/.github/actions/git/tag-check@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}
          version_file: ${{ inputs.project_base_dir }}/pyproject.toml
          fail_on_exists: true

      - name: 🐍 Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: ✅ Check Python version
        run: |
          python --version
          pip --version

      - name: 📦 Install dependencies
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        working-directory: ${{ inputs.project_base_dir }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${REGISTRY_PAT}@github.com/".insteadOf "https://github.com/"
          python -m pip install -e ".[dev]"

      - name: ✅ Check dependencies
        run: |
          pip check

      - name: 🧱📤 Git Leaks
        if: ${{!(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: felipementel/gh-actions/.github/actions/tools/security/giteaks@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks_license: ${{ secrets.GITLEAKS_LICENSE }}
          enable_summary: 'true'
          enable_upload_artifact: 'true'
          notify_user_list: '@felipementel'

      - name: 🐋 Docker setup
        uses: felipementel/gh-actions/.github/actions/tools/docker/setup@main

      - name: 🔍 Check for tests
        id: check_tests
        shell: bash
        run: |
          if find ${{ inputs.project_base_dir }} -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "HAS_TESTS=true" >> "$GITHUB_OUTPUT"
            echo -e "✅${GREEN} Arquivos de teste encontrados."
          else
            echo "HAS_TESTS=false" >> "$GITHUB_OUTPUT"
            echo -e "⚠️${YELLOW} Nenhum arquivo de teste encontrado."
          fi

      - name: 🧪 Run Python tests
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Set testing environment
          export TESTING=1
          export DISABLE_SSL_VERIFY=true

          # Ensure output directory exists
          mkdir -p tests/results

          # Run unit tests only with coverage
          echo -e "🧪${GREEN} Running unit tests with coverage..."
          python -m pytest -v \
            --cov=${{ inputs.project_base_dir }} \
            --cov-report=html:tests/results/htmlcov \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }} \
            ${{ inputs.project_base_dir }}/tests/

      - name: 📊 Upload coverage to Codecov
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/codecov/codecov-action@main
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./tests/results/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 📸 SonarCloud Analysis
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/sonar-cloud-python@main
        with:
          has_tests: ${{ steps.check_tests.outputs.HAS_TESTS }}
          sonar_project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sonar_exclusions: ${{ inputs.sonar_exclusions }}
          project_base_dir: ${{ inputs.project_base_dir }}

      - name: 🎯 Generate coverage badge
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        uses: felipementel/gh-actions/.github/actions/tools/coverage-badge@main
        with:
          coverage_file: tests/results/coverage.xml
          coverage_format: cobertura

      - name: 🧪📤 Upload test coverage artifacts
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            ${{ inputs.project_base_dir }}/tests/results/htmlcov/
            ${{ inputs.project_base_dir }}/tests/results/coverage.xml
            coverage-badge.md
          retention_days: 30

      - name: Code Quality
        uses: felipementel/gh-actions/.github/actions/python/code-quality@main
        with:
          project_base_dir: ${{ inputs.project_base_dir }}

      - name:  Docker Build (local, for Security scan)
        uses: felipementel/gh-actions/.github/actions/tools/docker/buildx@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          image_name: ${{ inputs.image_name }}
          tag_version: ${{ steps.get_version.outputs.TAG }}
          dockerfile: ${{ inputs.dockerfile_folder }}/Dockerfile
          context: ${{ inputs.docker_build_context || '.' }}
          platforms: 'linux/amd64'
          push: 'false'
          load: 'true'

      - name: 🍵 Safety Python Dependency Check
        uses: felipementel/gh-actions/.github/actions/tools/security/safety-python@main
        with:
          api_key: ${{ secrets.SAFETY_API_KEY }}

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '.'
          scanners: 'vuln,misconfig,secret'
          format: 'sarif'
          output_file: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          category: 'trivy-fs-vuln'

      - name: 🔎 Trivy - license scan
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '.'
          scanners: 'license'
          format: 'sarif'
          output_file: 'trivy-license-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          category: 'trivy-fs-license'

      - name: 🔎 Trivy - Image Scan (vuln, secret)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          image_ref: ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }}:${{ steps.get_version.outputs.TAG }}
          scan_type: 'image'
          format: 'sarif'
          output_file: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore_unfixed: true
          exit_code: '1'
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          category: 'trivy-image'

      - name: 🏷️ Create Tag
        id: github_tag
        if: ${{ inputs.build_mode != 'Build' }}
        uses: felipementel/gh-actions/.github/actions/git/tag-create@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}

      - name: 🔨 Export OpenAPI JSON from FastAPI
        if: ${{ inputs.openapi_folder != '' }}
        shell: bash
        run: |
          mkdir -p ./${{ inputs.openapi_folder }}
          MAIN_MODULE=$(basename "${{ inputs.main_file }}" .py)
          python -c "
          import json, sys, importlib
          sys.path.insert(0, '${{ inputs.project_base_dir }}')
          mod = importlib.import_module('${MAIN_MODULE}')
          with open('./${{ inputs.openapi_folder }}/openapi.json', 'w') as f:
              json.dump(mod.app.openapi(), f, indent=2)
          print('OpenAPI JSON exported successfully')
          "

      - name: 🚀 Spectral OpenAPI Lint
        if: ${{ inputs.openapi_folder != '' }}
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/spectral@main
        with:
          openapi_files_path: ./${{ inputs.openapi_folder }}
          node_version: ${{ env.node_version }}

      - name: 🧾 Write to workflow job summary
        run: |
          SUMMARY='
          # 📦 Build Completed
          | Campo          | Valor |
          |----------------|-------|
          | Versão         | ${{ steps.get_version.outputs.TAG }} |
          | Data           | ${{ steps.get_env.outputs.NOW }} |
          | Python Version | ${{ inputs.python_version }} |
          | Environment    | ${{ inputs.environment }} |

          ## ✅ Build Status
          - ✅ Código Python validado
          - ✅ Dependências instaladas
          - ✅ Testes executados (se disponíveis)
          - ✅ Linting executado'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  check_image:
    name: Check if Docker image exists
    if: ${{ inputs.build_mode == 'Build + Push' }}
    # environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_exists: ${{ steps.check_image.outputs.IMAGE_EXISTS }}

    steps:
      - name: 🔍 Check if image exists in registry
        id: check_image
        uses: felipementel/gh-actions/.github/actions/tools/docker/check-image@main
        with:
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry_username || github.actor }}
          registry_password: ${{ secrets.REGISTRY_PAT }}
          image_name: ${{ inputs.image_name }}
          tag_version: ${{ needs.build.outputs.tag_version }}

  push_image:
    name: Build and Push Docker Image
    if: ${{ inputs.build_mode == 'Build + Push' && needs.check_image.outputs.image_exists == 'false' }}
    # environment: ${{ inputs.environment }}
    needs: [build, check_image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - name: 📥 Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          fetch_depth: 0
          sparse_checkout: |
            source/
            docker/
          sparse_checkout_cone_mode: false

      - name: 🏗️ Set up QEMU
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/setup-qemu-action@main

      - name: 🏗️ Set up Docker Buildx
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/setup-buildx-action@main
        with:
          version: latest
          platforms: linux/amd64,linux/arm64

      - name: 🔐 Log in to registry
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/login-action@main
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username || github.actor }}
          password: ${{ secrets.REGISTRY_PAT }}

      - name: 🏷️ Extract metadata for Docker
        id: meta
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/metadata-action@main
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }}

      - name: 🐳 Push Docker image
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/build-push-action@main
        with:
          context: ${{ inputs.docker_build_context || '.' }}
          file: ${{ inputs.dockerfile_folder }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          secrets: |
            REGISTRY_PAT=${{ secrets.REGISTRY_PAT }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }}:${{ needs.build.outputs.tag_version }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.build.outputs.tag_version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache_from: type=gha
          cache_to: type=gha,mode=max

      - name: 📝 Write image summary
        run: |
          SUMMARY='
          # 🐳 Docker Image Published

          | Campo | Valor |
          |-------|-------|
          | Image | ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }} |
          | Tag | ${{ needs.build.outputs.tag_version }} |
          | Registry | ${{ inputs.registry }} |
          | Platforms | linux/amd64, linux/arm64 |
          | Security Scan | ✅ Validated in build job |
          | Status | ✅ Publicada com sucesso |'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

  notify_image_exists:
    name: Notify Image Already Exists
    if: ${{ inputs.build_mode == 'Build + Push' && needs.check_image.outputs.image_exists == 'true' }}
    needs: [build, check_image]
    # environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Notify existing image
        run: |
          SUMMARY='
          # ⚠️ Imagem Já Existe

          A imagem Docker com a tag **${{ needs.build.outputs.tag_version }}** já existe no registry.

          | Campo | Valor |
          |-------|-------|
          | Tag | ${{ needs.build.outputs.tag_version }} |
          | Registry | ${{ inputs.registry }}/${{ inputs.registry_username || github.actor }}/${{ inputs.image_name }} |
          | Status | ⚠️ Imagem já existe |

          **Ações puladas:**
          - ⏭️ Build da imagem Docker
          - ⏭️ Push para o registry

          Para forçar um novo build, altere a versão ou delete a imagem existente.'
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
