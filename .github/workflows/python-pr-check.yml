name: Pull Request Validation - Python

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: 'Environment to run the workflow'
        required: true
        default: 'development'
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
      project_base_dir:
        description: 'Path to project root (containing pyproject.toml)'
        required: false
        type: string
        default: 'source'
      main_project:
        description: 'Project name used in SonarCloud and reporting'
        required: false
        type: string
        default: ''
      main_file:
        type: string
        description: 'Main Python file'
        required: false
        default: 'main.py'
      sparse_checkout:
        description: 'Sparse checkout pattern'
        required: false
        type: string
        default: 'source/'
      tests_folder:
        description: 'The main test folder'
        required: false
        type: string
        default: 'tests'
      report_title:
        type: string
        description: 'Message to be displayed in the unit test report title'
        required: false
        default: 'Sky Platform'
      sonar_exclusions:
        description: 'Paths to exclude from SonarCloud analysis (comma separated)'
        required: false
        type: string
        default: ''
      image_name:
        description: 'Docker image name for registry validation'
        required: false
        type: string
        default: ''
      openapi_folder:
        description: 'Path to folder that will receive the exported OpenAPI JSON. Leave empty to skip Spectral linting.'
        required: false
        type: string
        default: ''
      docker_file_full_path:
        type: string
        description: 'Full path to the Dockerfile (e.g. docker/Dockerfile)'
        required: false
        default: ''
      dockerfile_folder:
        description: 'Folder containing the Dockerfile (relative to repo root)'
        required: false
        type: string
        default: 'docker'
      docker_build_context:
        description: 'Docker build context (relative to repo root)'
        required: false
        type: string
        default: '.'
      docker_setup:
        description: 'Whether to set up Docker for multi-platform builds'
        required: false
        type: boolean
        default: false
      coverage_threshold:
        description: 'Minimum coverage percentage required (0-100)'
        required: false
        type: number
        default: 0
      #registry
      registry:
        type: string
        description: 'Container registry URL (e.g. ghcr.io, docker.io, myacr.azurecr.io)'
        required: false
        default: 'ghcr.io'
      registry_username:
        type: string
        description: 'Registry username / org. Defaults to github.actor when empty (suitable for ghcr.io)'
        required: false
        default: ''
    secrets:
      SONAR_TOKEN:
        required: false
        description: 'SonarCloud token'
      SONAR_PROJECT_KEY:
        required: false
        description: 'SonarCloud project key'
      GITLEAKS_LICENSE:
        required: true
        description: 'Gitleaks License'
      REGISTRY_PAT:
        required: true
        description: 'Registry PAT'
      SAFETY_API_KEY:
        required: false
        description: 'Safety API Key'
  workflow_dispatch:

env:
  # Colors for output
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'
  BLUE: '\033[0;34m'
  RESET: '\033[0m'
  BOLD: '\033[1m'
  BOLD_GREEN: '\033[1;32m'
  BOLD_YELLOW: '\033[1;33m'

  # Container Registry
  registry: 'ghcr.io/felipementel'

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Job 1: Linting e formatação
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      statuses: read

    steps:
      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          ref: ${{ github.ref }}
          fetch_depth: 0
          sparse_checkout: |
            source/
            tests/
            docker/
          sparse_checkout_cone_mode: false

      - name: 🧱📤 Git Leaks
        if: ${{ !(github.event_name == 'pull_request' && github.actor == 'dependabot[bot]') }}
        uses: felipementel/gh-actions/.github/actions/tools/security/giteaks@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks_license: ${{ secrets.GITLEAKS_LICENSE }}
          enable_summary: 'true'
          enable_upload_artifact: 'true'
          notify_user_list: '@felipementel'

      # - name: 🔍 Check trivyignore
      #   id: check_trivyignore
      #   shell: bash
      #   run: |
      #     if [ -f .trivyignore.yaml ]; then
      #       echo -e "${GREEN} ✅ .trivyignore.yaml encontrado"
      #       echo "path=.trivyignore.yaml" >> "$GITHUB_OUTPUT"
      #     else
      #       echo -e "${YELLOW} ℹ️ .trivyignore.yaml não encontrado, ignorefile não será usado"
      #       echo "path=" >> "$GITHUB_OUTPUT"
      #     fi

      # Trivy no source/repo SAST scan (vulnerabilities, secrets, misconfigurations)
      - name: 🔎 Trivy - Filesystem Scan (vuln, secret, misconfig)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '${{ env.working_directory }}'
          scanners: 'vuln,misconfig,secret'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore_unfixed: true
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          exit_code: '1'

      - name: 🔎 Trivy - License Scan (vuln, secret, misconfig)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '${{ env.working_directory }}'
          scanners: 'license'
          format: 'github'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore_unfixed: true
          trivyignores: ${{ hashFiles('.trivyignore.yaml') != '' && '.trivyignore.yaml' || '' }}
          exit_code: '1'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install dependencies
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${REGISTRY_PAT}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: Code Quality
        uses: felipementel/gh-actions/.github/actions/python/code-quality@main
        with:
          project_base_dir: ${{ inputs.project_base_dir }}

      - name: Generate OpenAPI spec (FastAPI)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/${{ inputs.project_base_dir }}
          if [ -f "${{ inputs.project_base_dir }}/.env.example" ]; then
            cp "${{ inputs.project_base_dir }}/.env.example" "${{ inputs.project_base_dir }}/.env"
          fi
          export LOG_DIR="${{ github.workspace }}/.logs"
          mkdir -p "$LOG_DIR"
          python - << 'EOF'
          from ${{ inputs.project_base_dir }}.main import app
          import json
          with open("openapi.json", "w") as f:
              json.dump(app.openapi(), f, indent=2)
          EOF

      - name: Upload OpenAPI spec artifact
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: openapi-${{ github.run_number }}.json
          path: |
            openapi.json

      # - name: Download OWASP Spectral ruleset
      #   run: |
      #     curl -sSL https://unpkg.com/@stoplight/spectral-owasp-ruleset/dist/ruleset.mjs \
      #       -o spectral-owasp.mjs

      # - name: Run Spectral
      #   uses: stoplightio/spectral-action@latest
      #   with:
      #     # Ajuste para onde o openapi.json foi gerado
      #     file_glob: 'openapi.json'
      #     spectral_ruleset: spectral-owasp.mjs

  # Job 2: Testes de unidade
  test_unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          sparse_checkout: |
            source/
            tests/
            docker/
          sparse_checkout_cone_mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${REGISTRY_PAT}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: 🔍 Check for tests
        id: check_tests
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name 'test_*.py' -o -name '*_test.py')" ]; then
            echo "HAS_TESTS=true" >> "$GITHUB_OUTPUT"
            echo -e "✅${GREEN} Test files found."
          else
            echo "HAS_TESTS=false" >> "$GITHUB_OUTPUT"
            echo -e "⚠️${YELLOW} No test files found. Skipping tests."
          fi

      - name: Run unit tests with coverage
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        run: |
          # Set testing environment
          export TESTING=1
          export DISABLE_SSL_VERIFY=true

          # Run unit tests only with coverage
          echo -e "🧪${BLUE} Running unit tests with coverage..."
          pytest -v \
            --cov=${{ inputs.project_base_dir }} \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=html:tests/results/htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }}

      - name: Upload coverage to Codecov
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/codecov/codecov-action@main
        with:
          files: ./tests/results/coverage.xml
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 🎯 Generate coverage badge
        if: github.ref == 'refs/heads/main'
        uses: felipementel/gh-actions/.github/actions/tools/coverage-badge@main
        with:
          coverage_file: tests/results/coverage.xml
          coverage_format: cobertura

      - name: Archive coverage HTML report
        if: ${{ steps.check_tests.outputs.HAS_TESTS == 'true' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: coverage-report-unit
          path: tests/results/htmlcov/
          retention_days: 30

      - name: 📸 SonarCloud Analysis
        uses: felipementel/gh-actions/.github/actions/tools/code-quality/sonar-cloud-python@main
        with:
          has_tests: ${{ steps.check_tests.outputs.HAS_TESTS }}
          sonar_project_key: ${{ secrets.SONAR_PROJECT_KEY }}
          sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sonar_exclusions: ${{ inputs.sonar_exclusions }}
          project_base_dir: ${{ inputs.project_base_dir }}

  # Job 3: Validação de versão
  version_check:
    name: Version Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main

      - name: 🏷️ Extract Application Version
        uses: felipementel/gh-actions/.github/actions/python/get-version@main
        id: get_version
        with:
          environment: DEV

      - name: Validate semantic versioning format
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo -e "${RED}❌ ERROR: Version '$VERSION' does not follow semantic versioning (X.Y.Z)"
            exit 1
          fi
          echo -e "${GREEN}✅ Version format is valid: $VERSION"

      - name: 🔍 Check if tag already exists
        uses: felipementel/gh-actions/.github/actions/check-tag-exists@main
        with:
          tag: ${{ steps.get_version.outputs.TAG }}
          version_file: pyproject.toml

      - name: 🔐 Log in to GHCR for image validation
        if: ${{ inputs.image_name != '' }}
        uses: felipementel/gh-actions/.github/actions/_wrapper/docker/login-action@main
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PAT }}

      - name: 🔍 Check if Docker image with version tag exists
        if: ${{ inputs.image_name != '' }}
        id: check_image
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          IMAGE_TAG="${{ env.registry }}/${{ inputs.image_name }}:$VERSION"

          echo "🔍 Checking if image exists: $IMAGE_TAG"

          if docker manifest inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo "IMAGE_EXISTS=true" >> "$GITHUB_OUTPUT"
            echo -e "${RED}❌ ERROR: Docker image with tag $VERSION already exists in registry!"
            echo "::error::Image $IMAGE_TAG already exists. Please increment the version in pyproject.toml"
            exit 1
          else
            echo "IMAGE_EXISTS=false" >> "$GITHUB_OUTPUT"
            echo -e "${GREEN}✅ Docker image with tag $VERSION does not exist (OK to proceed)"
          fi

      - name: Version summary
        if: always()
        run: |
          echo "## 📋 Version Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.get_version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.image_name }}" != "" ]]; then
            echo "| **Docker Image** | \`${{ env.registry }}/${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ steps.check_image.outputs.IMAGE_EXISTS }}" == "true" ]]; then
              echo "| **Image Status** | ❌ Already exists in registry |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⚠️ Action Required" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "The Docker image with version \`${{ steps.get_version.outputs.VERSION }}\` already exists in the registry." >> $GITHUB_STEP_SUMMARY
              echo "Please increment the version in \`pyproject.toml\` before merging." >> $GITHUB_STEP_SUMMARY
            else
              echo "| **Image Status** | ✅ Version available for use |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # Job 5: Build validation
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [test_unit, version_check]

    steps:
      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install dependencies
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${REGISTRY_PAT}@github.com/".insteadOf "https://github.com/"
          pip install -e .

      - name: Check dependencies
        run: |
          pip check

      - name: Build summary
        run: |
          echo "## Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependencies are consistent" >> $GITHUB_STEP_SUMMARY

  # Job 6: Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Install security tools
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          python -m pip install --upgrade pip
          git config --global url."https://${REGISTRY_PAT}@github.com/".insteadOf "https://github.com/"
          pip install -e ".[dev]"

      - name: Run Bandit security scan
        run: |
          # Check if .bandit config file exists
          if [ -f ".bandit" ]; then
            echo -e "${GREEN}Using .bandit configuration file"
            bandit -r ${{ inputs.project_base_dir }} -c .bandit -f json -o bandit-report.json || true
            bandit -r ${{ inputs.project_base_dir }} -c .bandit -f screen
          else
            echo -e "${YELLOW}No .bandit config found, using default settings"
            bandit -r ${{ inputs.project_base_dir }} -f json -o bandit-report.json || true
            bandit -r ${{ inputs.project_base_dir }} -f screen
          fi

      # https://www.getsafety.com/pricing
      # - name: Check dependencies for vulnerabilities (Safety)
      #   run: |
      #     if [ -n "$SAFETY_API_KEY" ]; then
      #     safety scan --output json || true
      #     safety scan
      #     else
      #       echo "⚠️ SAFETY_API_KEY not set — skipping Safety scan"
      #     fi
      #   env:
      #     SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

      # https://www.getsafety.com/pricing

      - name: Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

      # - name: Check dependencies for vulnerabilities (pip-audit)
      #   run: |
      #     pip install pip-audit
      #     pip-audit --format json --output pip-audit-report.json || true
      #     pip-audit

      - name: Upload security reports
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention_days: 30
          # pip-audit-report.json

      - name: 🐳 Build Docker image for scanning
        if: ${{ inputs.image_name != '' }}
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          echo -e "${BLUE}Building Docker image for security scan..."
          if [ -d "docker" ] && [ -f "docker/Dockerfile" ]; then
            docker build \
              --secret id=REGISTRY_PAT,env=REGISTRY_PAT \
              -f docker/Dockerfile \
              -t scan-image:pr-${{ github.event.pull_request.number }} \
              .
            echo "IMAGE_BUILT=true" >> $GITHUB_ENV
          else
            echo "No Dockerfile found, skipping image scan"
            echo "IMAGE_BUILT=false" >> $GITHUB_ENV
          fi

      - name: 🔍 Trivy - Scan Docker image
        if: ${{ inputs.image_name != '' && env.IMAGE_BUILT == 'true' }}
        uses: felipementel/gh-actions/.github/actions/trivy-scan@main
        with:
          scan_type: 'image'
          image_ref: scan-image:pr-${{ github.event.pull_request.number }}
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'sarif'
          output_file: 'trivy-pr-results.sarif'
          upload_to_security: 'false'
          exit_code: '1'

      - name: 📊 Security summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Code Security) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Safety (Dependencies) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ env.IMAGE_BUILT }}" == "true" ]]; then
            echo "| Trivy (Container Security) | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Trivy (Container Security) | ⚠️ Skipped (no Dockerfile) |" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 7: Test summary
  test_summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test_unit]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test_unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test_unit.result }}" == "success" ]]; then
            echo -e "${GREEN}✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo -e "${RED}❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Checkout code
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          sparse_checkout: |
            source/
          sparse_checkout_cone_mode: false
