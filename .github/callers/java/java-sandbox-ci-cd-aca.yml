# {
#  "apiVersion": apps/v1.0.0
#  "kind": "ci-cd"
#  "stack": "java"
# }

name: Java API — Build & Deploy [Caller]
run-name: "${{ github.actor }} | ${{ inputs.buildMode }} | ${{ inputs.environment }}"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      buildMode:
        description: "Qual ação deseja fazer?"
        required: true
        default: 'Build'
        type: choice
        options:
          - Build
          - Build + Tag Validation
          - Build + Tag Validation + Deploy
      environment:
        description: "Selecione o ambiente de implantação"
        required: true
        default: 'development'
        type: environment

jobs:
  build:
    name: Build
    uses: felipementel/gh-actions/.github/workflows/java-sandbox-api-build.yml@main
    with:
      buildMode: ${{ github.event_name == 'workflow_dispatch' && inputs.buildMode || 'Build' }}
      environment: ${{ inputs.environment || 'development' }}
      javaVersion: ${{ vars.BUILD_VERSION }}
      projectBaseDir: './src'
      mainProject: 'myproject-api'
      testsFolder: 'tests'
      reportTitle: 'My Project API'
      sonarExclusions: ''
      imageName: ${{ github.event.repository.name }}
      openAPIFolder: 'open-api'
      dockerFileFullPath: 'docker/Dockerfile'
      dockerBuildContext: '.'
      registry: ${{ vars.CONTAINER_REGISTRY }}
    permissions:
      security-events: write
      contents: write
      id-token: write
      packages: write
    secrets:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
      # SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      # REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}  # Opcional — padrão: GITHUB_TOKEN

  deploy:
    name: Deploy to ACA
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.buildMode == 'Build + Tag Validation + Deploy' &&
      needs.build.outputs.image-exists == 'false'
    needs: [build]
    uses: felipementel/gh-actions/.github/workflows/java-sandbox-api-deploy-aca.yml@main
    with:
      environment: ${{ inputs.environment || 'development' }}
      tagVersion: ${{ needs.build.outputs.tag-version }}
      imageName: ${{ github.event.repository.name }}
      registry: ${{ vars.CONTAINER_REGISTRY }}
      # registryUsername: ''  # Deixe vazio para usar github.actor (padrão ghcr.io)
      azureRgBase: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
      acaeBaseName: ${{ vars.AZURE_ACAE_BASE }}
      healthCheckPath: '/health/live'
      deployPollMaxAttempts: '20'
      deployPollIntervalSeconds: '15'
    permissions:
      id-token: write
      contents: read
      packages: read
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
