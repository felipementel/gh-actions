# {
#  "apiVersion": apps/v1.0.0
#  "kind": "pr-check"
#  "stack": "java"
# }


name: Java API — PR Check [Caller]
run-name: "${{ github.actor }} | PR Check | ${{ github.ref_name }}"

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docker/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Selecione o ambiente de implantação"
        required: true
        default: 'development'
        type: environment

jobs:
  pr-check:
    name: PR Check
    uses: felipementel/gh-actions/.github/workflows/java-pr-check.yml@main
    with:
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
      javaVersion: ${{ vars.BUILD_VERSION }}
      projectBaseDir: './src'
      mainProject: 'myproject-api'
      testsFolder: 'tests'
      reportTitle: 'My Project API - PR'
      sonarExclusions: ''
      imageName: ${{ github.event.repository.name }}
      openAPIFolder: 'open-api'
      dockerFileFullPath: 'docker/Dockerfile'
      dockerBuildContext: '.'
    permissions:
      security-events: write
      contents: write
      id-token: write
      packages: write
    secrets:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
