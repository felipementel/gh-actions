# {
#  "apiVersion": apps/v1.0.0
#  "kind": "security-weekly"
#  "stack": "python"
# }

name: Python API — Weekly Security Scan 🐍🛡️
run-name: "🛡️ Weekly Security Scan | ${{ github.actor }}"

on:
  schedule:
    - cron: '0 11 * * 1'  # Every Monday at 08:00 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente para DAST"
        required: true
        default: 'development'
        type: environment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  trivy_sast:
    name: SAST — Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout
        uses: felipementel/gh-actions/.github/actions/_wrapper/github/checkout@main
        with:
          ref: ${{ github.ref }}
          fetch_depth: 0
          sparse_checkout: |
            source/
            Docker/
          sparse_checkout_cone_mode: false

      - name: 🔎 Trivy — Filesystem Scan (vuln, secret, misconfig)
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '.'
          scanners: 'vuln,misconfig,secret'
          format: 'sarif'
          output_file: 'trivy-weekly-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '0'
          category: 'trivy-weekly-fs'

      - name: 🔎 Trivy — License Scan
        uses: felipementel/gh-actions/.github/actions/tools/security/trivy-scan@main
        with:
          scan_type: 'fs'
          scan_ref: '.'
          scanners: 'license'
          format: 'sarif'
          output_file: 'trivy-weekly-license-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore_unfixed: true
          exit_code: '0'
          category: 'trivy-weekly-license'

  dast:
    name: DAST — ZAP + Nuclei
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment || 'development' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 🔐 Azure Login
        uses: felipementel/gh-actions/.github/actions/azure/az-login@main
        with:
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🧾 Compute Azure Container App names
        id: naming
        uses: felipementel/gh-actions/.github/actions/azure/aca-naming@main
        with:
          environment: ${{ inputs.environment || 'development' }}
          azure_resource_group: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          acae_base_name: ${{ vars.AZURE_ACAE_BASE }}
          repo_name: ${{ github.event.repository.name }}

      - name: 🌐 Get App FQDN
        id: fqdn
        shell: bash
        run: |
          FQDN=$(az containerapp show \
            --name "${{ steps.naming.outputs.AZURE_ACA_NAME }}" \
            --resource-group "${{ steps.naming.outputs.AZURE_RG_NAME }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "FQDN=$FQDN" >> $GITHUB_OUTPUT

      - name: 🕷️ OWASP ZAP Baseline
        uses: felipementel/gh-actions/.github/actions/tools/security/owasp-zap@main
        with:
          url: https://${{ steps.fqdn.outputs.FQDN }}
          allow_issue_writing: 'false'
          fail_action: 'false'
          artifact_name: zap-weekly-report-${{ inputs.environment || 'development' }}

      - name: 🔬 Nuclei DAST Scan
        uses: felipementel/gh-actions/.github/actions/tools/security/nuclei@main
        with:
          url: https://${{ steps.fqdn.outputs.FQDN }}
          artifact_name: nuclei-weekly-report-${{ inputs.environment || 'development' }}
