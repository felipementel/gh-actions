name: Python API — OTel Pipeline Export 📊
run-name: "📊 OTel Export | ${{ github.event.workflow_run.name }}"

on:
  workflow_run:
    workflows:
      - 'Python API — Build & Deploy [Caller]'
      - 'Python API - PR Check [Caller]'
      - 'Python API — Weekly Security Scan 🐍🛡️'
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to export (optional)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  otel_export:
    name: Export to Grafana Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read

    steps:
      - name: 📊 Export pipeline trace to Grafana Cloud
        uses: inception-health/otel-export-trace-action@v1
        with:
          otlpEndpoint: ${{ secrets.GRAFANA_OTLP_ENDPOINT }}
          otlpHeaders: ${{ secrets.GRAFANA_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.event.workflow_run.id }}

      - name: 📊 Export pipeline trace to HoneyComb
        uses: inception-health/otel-export-trace-action@v1
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: ${{ secrets.HONEYCOMB_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          runId: ${{ github.event.workflow_run.id }}
          runId: ${{ github.event.workflow_run.id }}
