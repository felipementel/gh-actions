name: 'SonarCloud GitHub Action (Wrapper)'
description: 'Wrapper composite action for sonarsource/sonarqube-scan-action. Update the version only here.'

inputs:
  args:
    description: 'Additional arguments to the Sonar Scanner CLI'
    required: false
    default: ''
  project_base_dir:
    description: 'Set the sonar.projectBaseDir analysis property'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: ☁️ SonarCloud Scan
      id: sonar
      uses: sonarsource/sonarqube-scan-action@v6
      with:
        args: ${{ inputs.args }}
        projectBaseDir: ${{ inputs.project_base_dir }}
