name: 'Get Version from pom.xml'
description: 'Extracts version information from a Maven pom.xml file and builds a TAG.'

inputs:
  project_base_dir:
    description: 'Path to the project base directory (containing pom.xml)'
    required: true
  environment:
    description: 'Deployment environment (e.g., development, staging, production)'
    required: true
    default: 'development'

outputs:
  TAG:
    description: 'The final computed tag (version with environment suffix if applicable)'
    value: ${{ steps.get_version.outputs.TAG }}
  VERSION:
    description: 'The version value from pom.xml'
    value: ${{ steps.get_version.outputs.VERSION }}

env:
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'

runs:
  using: 'composite'
  steps:
    - name: 🔍 Get-Version from pom.xml
      id: get_version
      shell: bash
      run: |
        pom_path="${{ inputs.project_base_dir }}/pom.xml"

        if [ ! -f "$pom_path" ]; then
          echo -e "${RED}❌ Erro: pom.xml não encontrado em: $pom_path"
          exit 1
        fi

        # Try Maven first (more reliable for multi-module projects)
        if command -v mvn &>/dev/null; then
          version=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q -DforceStdout \
            --file "$pom_path" 2>/dev/null | tail -1)
        fi

        # Fallback to sed if Maven is not available or returned empty
        if [ -z "$version" ] || [ "$version" = "null" ]; then
          version=$(sed -n 's/.*<version>\(.*\)<\/version>.*/\1/p' "$pom_path" | head -1)
        fi

        if [ -z "$version" ]; then
          echo -e "${RED}❌ Erro: Não foi possível extrair a versão do pom.xml"
          exit 1
        fi

        tag="$version"
        # Append suffix based on environment
        ENVIRONMENT='${{ inputs.environment }}'
        BRANCH_NAME="${GITHUB_REF_NAME}"

        if [ "${ENVIRONMENT,,}" == "development" ]; then
          tag="${tag}-dev"
          echo -e "🔧 ${YELLOW} Aplicando sufixo -dev (env=$ENVIRONMENT, branch=$BRANCH_NAME)"
        elif [ "${ENVIRONMENT,,}" == "staging" ]; then
          tag="${tag}-sandbox"
          echo -e "🛡️ ${YELLOW} Aplicando sufixo -sandbox (env=$ENVIRONMENT, branch=$BRANCH_NAME)"
        else
          echo -e "✅ ${GREEN} Sem sufixo (env=$ENVIRONMENT, branch=$BRANCH_NAME)"
        fi

        echo -e "📦${GREEN} Version: $version"
        echo -e "🏷️${GREEN} TAG final: $tag"

        echo "TAG=$tag" >> "$GITHUB_OUTPUT"
        echo "VERSION=$version" >> "$GITHUB_OUTPUT"
