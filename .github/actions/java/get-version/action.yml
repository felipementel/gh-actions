name: 'Get Version from pom.xml'
description: 'Extracts version information from a Maven pom.xml file and builds a TAG.'

inputs:
  projectBaseDir:
    description: 'Path to the project base directory (containing pom.xml)'
    required: true
  mainProject:
    description: 'The main project/module name (e.g. myproject-api)'
    required: true

outputs:
  TAG:
    description: 'The final computed tag (version)'
    value: ${{ steps.get-version.outputs.TAG }}
  VERSION:
    description: 'The version value from pom.xml'
    value: ${{ steps.get-version.outputs.VERSION }}

env:
  RED: '\033[0;31m'
  GREEN: '\033[0;32m'
  YELLOW: '\033[0;33m'

runs:
  using: 'composite'
  steps:
    - name: 🔍 Get-Version from pom.xml
      id: get-version
      shell: bash
      run: |
        pom_path="${{ inputs.projectBaseDir }}/pom.xml"

        if [ ! -f "$pom_path" ]; then
          echo -e "${RED}❌ Erro: pom.xml não encontrado em: $pom_path"
          exit 1
        fi

        # Try Maven first (more reliable for multi-module projects)
        if command -v mvn &>/dev/null; then
          version=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q -DforceStdout \
            --file "$pom_path" 2>/dev/null | tail -1)
        fi

        # Fallback to sed if Maven is not available or returned empty
        if [ -z "$version" ] || [ "$version" = "null" ]; then
          version=$(sed -n 's/.*<version>\(.*\)<\/version>.*/\1/p' "$pom_path" | head -1)
        fi

        if [ -z "$version" ]; then
          echo -e "${RED}❌ Erro: Não foi possível extrair a versão do pom.xml"
          exit 1
        fi

        echo -e "📦${GREEN} Version: $version"
        echo -e "🏷️${GREEN} TAG final: $version"

        echo "TAG=$version" >> "$GITHUB_OUTPUT"
        echo "VERSION=$version" >> "$GITHUB_OUTPUT"
