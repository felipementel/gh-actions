name: Python Code Quality
description: Run isort, black, flake8, mypy and bandit checks

inputs:
  app_dir:
    description: 'Application source directory (e.g. src)'
    required: false
    default: 'src'
  python_version:
    description: 'Python version to use (e.g. 3.14)'
    required: false
    default: '3.14'

runs:
  using: 'composite'
  steps:

    - name: Code Quality - isort
      shell: bash
      run: |
        python${{ inputs.python_version }} -m isort --check-only --settings-path ${{ inputs.app_dir }}/pyproject.toml ${{ inputs.app_dir }}/src

    - name: Code Quality - black
      shell: bash
      run: |
        python${{ inputs.python_version }} -m black --check --config ${{ inputs.app_dir }}/pyproject.toml ${{ inputs.app_dir }}/src

    - name: Code Quality - flake8
      shell: bash
      run: |
        python${{ inputs.python_version }} -m flake8 --toml-config ${{ inputs.app_dir }}/pyproject.toml ${{ inputs.app_dir }}/src

    - name: Code Quality - mypy
      shell: bash
      run: |
        cd ${{ inputs.app_dir }} && python${{ inputs.python_version }} -m mypy --config-file pyproject.toml src

    - name: Code Quality - bandit
      shell: bash
      run: |
        python${{ inputs.python_version }} -m bandit -c ${{ inputs.app_dir }}/pyproject.toml -r ${{ inputs.app_dir }}/src
