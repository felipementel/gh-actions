name: 'SonarCloud Analysis - Python'
description: 'Sets up and runs SonarCloud analysis for Python projects with or without test coverage.'

inputs:
  has_tests:
    description: 'Whether tests were run and coverage should be included (true/false)'
    required: true
    default: 'false'
  sonar_project_key:
    description: 'SonarCloud project key'
    required: true
  sonar_organization:
    description: 'SonarCloud organization'
    required: true
  sonar_token:
    description: 'SonarCloud token'
    required: true
  github_token:
    description: 'GitHub token'
    required: true
  sonar_exclusions:
    description: 'Paths to exclude from Sonar analysis (comma separated)'
    required: false
    default: ''
  app_dir:
    description: 'Application source directory to analyze'
    required: false
    default: 'src'
  coverage_report:
    description: 'Path to the coverage XML report generated by pytest-cov'
    required: false
    default: 'tests/results/coverage.xml'

runs:
  using: 'composite'
  steps:
    - name: 📸 SonarCloud Analysis (Test ✅, Sonar ✅)
      if: ${{ inputs.has_tests == 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.sources=${{ inputs.app_dir }}
          -Dsonar.python.coverage.reportPaths=${{ inputs.coverage_report }}
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}

    - name: 📸 SonarCloud Analysis (Test ⛔, Sonar ✅)
      if: ${{ inputs.has_tests != 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.sources=${{ inputs.app_dir }}
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}
