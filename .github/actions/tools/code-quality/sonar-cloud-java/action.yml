name: 'SonarCloud Analysis - Java'
description: 'Sets up and runs SonarCloud analysis for Java/Maven projects with or without test coverage.'

inputs:
  has_tests:
    description: 'Whether tests were run and coverage should be included (true/false)'
    required: true
    default: 'false'
  sonar_project_key:
    description: 'SonarCloud project key'
    required: true
  sonar_organization:
    description: 'SonarCloud organization'
    required: true
  sonar_token:
    description: 'SonarCloud token'
    required: true
  github_token:
    description: 'GitHub token'
    required: true
  sonar_exclusions:
    description: 'Paths to exclude from Sonar analysis (comma separated)'
    required: false
    default: ''
  project_base_dir:
    description: 'Path to project base directory (containing pom.xml)'
    required: true
  main_project:
    description: 'The main project/module name (e.g. myproject-api)'
    required: true
  java_version:
    description: 'Java version for the scanner'
    required: false
    default: '21'

runs:
  using: 'composite'
  steps:
    - name: 🛠️ Maven compile (ensures binaries exist for Sonar)
      shell: bash
      run: |
        mvn compile \
          --file ${{ inputs.project_base_dir }}/pom.xml \
          --batch-mode \
          -q

    - name: 📸 SonarCloud Analysis (Test ✅, Sonar ✅)
      if: ${{ inputs.has_tests == 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.sources=${{ inputs.project_base_dir }}/src/main/java
          -Dsonar.tests=${{ inputs.project_base_dir }}/src/test/java
          -Dsonar.java.binaries=${{ inputs.project_base_dir }}/target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=${{ inputs.project_base_dir }}/target/site/jacoco/jacoco.xml
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}

    - name: 📸 SonarCloud Analysis (Test ⛔, Sonar ✅)
      if: ${{ inputs.has_tests != 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.sources=${{ inputs.project_base_dir }}/src/main/java
          -Dsonar.java.binaries=${{ inputs.project_base_dir }}/target/classes
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}
