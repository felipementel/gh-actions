name: 'SonarCloud Analysis - Node.js'
description: 'Sets up and runs SonarCloud analysis for Node.js/React projects with or without test coverage.'

inputs:
  has_tests:
    description: 'Whether tests were run and coverage should be included (true/false)'
    required: true
    default: 'false'
  sonar_project_key:
    description: 'SonarCloud project key'
    required: true
  sonar_organization:
    description: 'SonarCloud organization'
    required: true
  sonar_token:
    description: 'SonarCloud token'
    required: true
  github_token:
    description: 'GitHub token'
    required: true
  sonar_exclusions:
    description: 'Paths to exclude from Sonar analysis (comma separated)'
    required: false
    default: ''
  project_base_dir:
    description: 'Working directory where package.json and source are located (projectBaseDir for the scanner)'
    required: false
    default: '.'
  coverage_report:
    description: 'Path to the LCOV coverage report (relative to working-directory)'
    required: false
    default: 'coverage/lcov.info'

runs:
  using: 'composite'
  steps:
    - name: 📸 SonarCloud Analysis (Test ✅, Sonar ✅)
      if: ${{ inputs.has_tests == 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        project_base_dir: ${{ inputs.project_base_dir }}
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.javascript.lcov.reportPaths=${{ inputs.coverage_report }}
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}

    - name: 📸 SonarCloud Analysis (Test ⛔, Sonar ✅)
      if: ${{ inputs.has_tests != 'true' }}
      uses: felipementel/gh-actions/.github/actions/_wrapper/sonar/sonarcloud-github-action@main
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}
      with:
        project_base_dir: ${{ inputs.project_base_dir }}
        args: >
          -Dsonar.projectKey=${{ inputs.sonar_project_key }}
          -Dsonar.organization=${{ inputs.sonar_organization }}
          -Dsonar.exclusions=${{ inputs.sonar_exclusions }}
