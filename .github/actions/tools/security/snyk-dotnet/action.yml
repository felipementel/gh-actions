name: 'Snyk Security Scan'
description: 'Runs Snyk container monitor, vulnerability scan, uploads SARIF and artifacts.'

inputs:
  snyk_token:
    description: 'Snyk API token'
    required: true
  project_base_dir:
    description: 'Path to project base directory'
    required: true
  main_project:
    description: 'The main project name'
    required: true
  solution_file_name:
    description: 'The SLNX or SLN full name'
    required: true
  image_name:
    description: 'Image name for container scan'
    required: true
  docker_file_full_path:
    description: 'Full path to the Dockerfile to be used in the container scan (e.g. src/Project/Project/Dockerfile)'
    required: false
    default: ''
  docker_build_context:
    description: 'Docker build context (e.g. src/Project/Project or .)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 🍵 Restore dependencies
      shell: bash
      run: |
        dotnet restore \
          ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj
      # dotnet build \
      #   ${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj \
      #   --no-restore \
      #   --output ./output_build

    - name: 🍵 Snyk Setup
      uses: snyk/actions/setup@master

    # - name: 🍵 Build a Docker image
    #   shell: bash
    #   run: |
    #     docker buildx build \
    #       -t felipementel/${{ inputs.image_name }} \
    #       -f ${{ inputs.docker-file-fullpath }} \
    #       ${{ inputs.docker_build_context }}

    - name: 🍵 Snyk Container Monitor
      shell: bash
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      run: |
        snyk container monitor \
          ${{ inputs.image_name }} \
          --app-vulns \
          --exclude-base-image-vulns \
          --file=${{ inputs.docker_file_full_path }}

    - name: 🍵 Run Snyk to check for vulnerabilities
      shell: bash
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      run: |
        snyk test \
          --app-vulns \
          --sarif-file-output=snykDotNet.sarif \
          --file=${{ inputs.project_base_dir }}/${{ inputs.main_project }}/${{ inputs.main_project }}.csproj

    - name: 🍵📤 Upload result to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: snykDotNet.sarif

    - name: 🍵📤 Upload Snyk Container test
      uses: felipementel/gh-actions/.github/actions/_wrapper/github/upload-artifact@main
      with:
        name: Snyk-Container-Test
        path: |
          vuln.json
